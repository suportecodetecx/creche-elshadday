        document.addEventListener('DOMContentLoaded', function() {
            carregarFuncionarios();
            carregarMotivos();
            // CORREÇÃO: Usar data local do Brasil
            document.getElementById('dataSaida').value = getDataLocalBrasil();
        });

        function carregarMotivos() {
            const select = document.getElementById('motivo');
            select.innerHTML = '<option value="">Selecione o motivo</option>';
            MOTIVOS.forEach(m => select.innerHTML += `<option value="${m}">${m}</option>`);
        }

        function carregarFuncionarios() {
            fetch('/api/funcionarios/listar')
                .then(r => r.json())
                .then(data => {
                    if (data.sucesso && data.funcionarios) {
                        funcionarios = data.funcionarios.sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR'));
                        const select = document.getElementById('colaborador');
                        select.innerHTML = '<option value="">Selecione um funcionário</option>';
                        funcionarios.forEach(f => select.innerHTML += `<option value="${f.rgm}">${f.nome}</option>`);
                    } else {
                        document.getElementById('colaborador').innerHTML = '<option value="">Nenhum funcionário cadastrado</option>';
                    }
                })
                .catch(e => mostrarNotificacao('Erro ao carregar funcionários', 'error'));
        }

        function preencherDadosFuncionario() {
            const func = funcionarios.find(f => f.rgm === document.getElementById('colaborador').value);
            if (func) {
                document.getElementById('cargo').value = func.funcao || '';
                document.getElementById('rgm').value = func.rgm;
                document.getElementById('unidade').value = func.unidade;
            } else {
                ['cargo', 'rgm', 'unidade'].forEach(id => document.getElementById(id).value = '');
            }
        }

        function gerarJustificativa() {
            const dataInput = document.getElementById('dataSaida').value;
            const rgm = document.getElementById('colaborador').value;
            const unidade = document.getElementById('unidade').value;
            const motivo = document.getElementById('motivo').value;
            
            if (!rgm || !motivo) {
                mostrarNotificacao('Selecione um colaborador e informe o motivo!', 'warning');
                return;
            }

            // CORREÇÃO: Usar formatação local sem conversão de timezone
            const dataFormatada = formatarDataLocal(dataInput);

            const dados = {
                data: dataFormatada,
                colaborador: document.getElementById('colaborador').options[document.getElementById('colaborador').selectedIndex]?.text || '',
                cargo: document.getElementById('cargo').value,
                rgm: rgm,
                unidade: unidade,
                apontamentoInicio: document.getElementById('apontamentoInicio').value || '___:___',
                apontamentoFim: document.getElementById('apontamentoFim').value || '___:___',
                motivo: motivo,
                observacoes: document.getElementById('observacoes').value || '',
                unidadeInfo: UNIDADES_CONFIG[unidade] || UNIDADES_CONFIG["CEIC El Shadday"],
                dataEmissao: new Date().toLocaleString('pt-BR')
            };

            const win = window.open('', '_blank');
            win.document.write(htmlImpressao);
            win.document.close();
            win.addEventListener('load', () => {
                win.preencherJustificativa(dados);
                setTimeout(() => win.print(), 500);
            });
            mostrarNotificacao('Documento gerado!', 'success');
        }

        function limparFormulario() {
            // CORREÇÃO: Usar data local do Brasil
            document.getElementById('dataSaida').value = getDataLocalBrasil();
            
            ['colaborador', 'cargo', 'rgm', 'unidade', 'apontamentoInicio', 'apontamentoFim', 'motivo', 'observacoes'].forEach(id => {
                document.getElementById(id).value = '';
            });
        }

        function mostrarNotificacao(msg, tipo = 'success') {
            const n = document.createElement('div');
            n.className = `notificacao-flutuante ${tipo}`;
            n.innerHTML = `<div class="notificacao-conteudo"><span class="notificacao-texto">${msg}</span></div>`;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }
    </script>
</body>
