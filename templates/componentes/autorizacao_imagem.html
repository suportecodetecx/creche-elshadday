<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Justificativa de Saída - Creche El Shadday</title>
    <style>
        /* CONFIGURAÇÃO OTIMIZADA PARA A4 */
        @page {
            size: A4;
            margin: 1.5cm 1.5cm 1.5cm 1.5cm;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: white;
            color: #000;
            line-height: 1.3;
            width: 100%;
            max-width: 210mm;
            margin: 0 auto;
        }

        .documento {
            width: 100%;
            padding: 0;
        }

        /* BOTÃO DE IMPRESSÃO (visível apenas na tela) */
        .print-button-container {
            text-align: center;
            margin: 20px 0 15px 0;
        }

        .print-button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            font-family: Arial, Helvetica, sans-serif;
        }

        .print-button:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }

        .print-button:active {
            transform: translateY(0);
        }

        @media print {
            .print-button-container {
                display: none;
            }
        }

        /* CABEÇALHO - ESTILO FICHA CADASTRAL */
        .cabecalho {
            text-align: center;
            margin-bottom: 8px;
        }

        .cabecalho h1 {
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            margin: 0;
        }

        .cabecalho h2 {
            font-size: 16px;
            font-weight: bold;
            margin: 3px 0;
            border-bottom: 2px solid #000;
            display: inline-block;
            padding-bottom: 3px;
        }

        .cabecalho p {
            font-size: 10px;
            margin: 2px 0;
        }

        .linha-simples {
            border-bottom: 1px solid #000;
            margin: 5px 0;
        }

        .titulo {
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
            border: 1px solid #000;
            padding: 6px;
            margin: 12px 0;
            background: #f5f5f5;
        }

        /* DADOS EM LINHA - IGUAL FICHA CADASTRAL */
        .dados-linha {
            display: flex;
            margin-bottom: 5px;
            font-size: 11px;
            border-bottom: 1px dotted #aaa;
            padding-bottom: 2px;
        }

        .dados-label {
            font-weight: bold;
            width: 130px;
        }

        .dados-valor {
            flex: 1;
        }

        /* ASSINATURAS */
        .assinatura-area {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            gap: 30px;
        }

        .assinatura-item {
            text-align: center;
            flex: 1;
        }

        .assinatura-linha {
            border-top: 1px solid #000;
            width: 200px;
            margin: 0 auto 8px;
        }

        .cut-line {
            text-align: center;
            margin: 20px 0;
            border-top: 1px dashed #999;
            position: relative;
        }

        .cut-line span {
            background: white;
            padding: 0 10px;
            position: relative;
            top: -10px;
            font-size: 9px;
            color: #666;
        }

        /* RODAPÉ */
        .rodape {
            display: flex;
            justify-content: space-between;
            font-size: 8px;
            border-top: 1px solid #000;
            padding-top: 6px;
            margin-top: 15px;
        }

        .rodape-info {
            display: flex;
            flex-direction: column;
        }

        .data-emissao {
            text-align: center;
            font-size: 8px;
            margin-top: 8px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="documento" id="documentoImpressao">
        <!-- BOTÃO DE IMPRESSÃO (visível apenas na tela) -->
        <div class="print-button-container">
            <button class="print-button" onclick="window.print()">
                🖨️ Imprimir Justificativa
            </button>
        </div>

        <!-- CONTEÚDO PARA IMPRESSÃO - SERÁ PREENCHIDO DINAMICAMENTE -->
        <div id="conteudoImpressao">
            <!-- O conteúdo será inserido via JavaScript -->
        </div>
    </div>

    <script>
        // Dados do formulário (serão preenchidos pela função do modal)
        let dadosJustificativa = null;

        // Receber dados do formulário principal
        function setDadosJustificativa(dados) {
            dadosJustificativa = dados;
            renderizarDocumento();
        }

        function renderizarDocumento() {
            if (!dadosJustificativa) return;

            const dataFormatada = dadosJustificativa.data || '___/___/_____';
            const colaboradorNome = dadosJustificativa.colaborador || '_________________________';
            const cargo = dadosJustificativa.cargo || '_________________________';
            const rgm = dadosJustificativa.rgm || '___________';
            const unidade = dadosJustificativa.unidade || '___________';
            const apontamentoInicio = dadosJustificativa.apontamentoInicio || '___:___';
            const apontamentoFim = dadosJustificativa.apontamentoFim || '___:___';
            const motivo = dadosJustificativa.motivo || '_________________________';
            const observacoes = dadosJustificativa.observacoes || '_________________________';
            const unidadeInfo = dadosJustificativa.unidadeInfo || {
                nome: 'CEIC El Shadday',
                endereco: 'Rua Francisco Vilani Bicudo, 470 - Vila Nova Aparecida',
                cidade: 'Mogi das Cruzes',
                uf: 'SP',
                cnpj: '03.067.526/0001-87',
                telefone: '(11) 4739-3549'
            };
            const dataEmissao = dadosJustificativa.dataEmissao || new Date().toLocaleString('pt-BR');

            const html = `
                <!-- VIA EMPRESA -->
                <div class="cabecalho">
                    <h1>CRECHE EL SHADDAY</h1>
                    <h2>${unidadeInfo.nome}</h2>
                    <p>CNPJ: ${unidadeInfo.cnpj} - ${unidadeInfo.cidade}/${unidadeInfo.uf}</p>
                </div>
                <div class="linha-simples"></div>
                
                <div class="titulo">JUSTIFICATIVA DE PONTO - VIA ORIGINAL</div>
                
                <div class="dados-linha">
                    <span class="dados-label">Data de Lançamento:</span>
                    <span class="dados-valor">${dataFormatada}</span>
                </div>
                <div class="dados-linha">
                    <span class="dados-label">Colaborador:</span>
                    <span class="dados-valor">${colaboradorNome}</span>
                </div>
                <div class="dados-linha">
                    <span class="dados-label">Cargo:</span>
                    <span class="dados-valor">${cargo}</span>
                </div>
                <div class="dados-linha">
                    <span class="dados-label">RGM:</span>
                    <span class="dados-valor">${rgm}</span>
                </div>
                <div class="dados-linha">
                    <span class="dados-label">Unidade:</span>
                    <span class="dados-valor">${unidade}</span>
                </div>
                <div class="dados-linha">
                    <span class="dados-label">Apontamento Início:</span>
                    <span class="dados-valor">${apontamentoInicio}</span>
                </div>
                <div class="dados-linha">
                    <span class="dados-label">Apontamento Fim:</span>
                    <span class="dados-valor">${apontamentoFim}</span>
                </div>
                <div class="dados-linha">
                    <span class="dados-label">Motivo:</span>
                    <span class="dados-valor">${motivo}</span>
                </div>
                <div class="dados-linha">
                    <span class="dados-label">Observações:</span>
                    <span class="dados-valor">${observacoes}</span>
                </div>
                
                <div class="assinatura-area">
                    <div class="assinatura-item">
                        <div class="assinatura-linha"></div>
                        <div>Assinatura do Colaborador</div>
                    </div>
                    <div class="assinatura-item">
                        <div class="assinatura-linha"></div>
                        <div>Assinatura do Responsável</div>
                    </div>
                </div>
                
                <div class="rodape">
                    <div class="rodape-info">
                        <span>${unidadeInfo.nome}</span>
                        <span>${unidadeInfo.endereco}</span>
                    </div>
                    <div>📞 ${unidadeInfo.telefone}</div>
                </div>
                
                <div class="cut-line"><span>✂️ RECORTE AQUI ✂️</span></div>
                
                <!-- VIA COLABORADOR -->
                <div class="cabecalho">
                    <h1>CRECHE EL SHADDAY</h1>
                    <h2>${unidadeInfo.nome}</h2>
                    <p>CNPJ: ${unidadeInfo.cnpj} - ${unidadeInfo.cidade}/${unidadeInfo.uf}</p>
                </div>
                <div class="linha-simples"></div>
                
                <div class="titulo">JUSTIFICATIVA DE PONTO - VIA COLABORADOR</div>
                
                <div class="dados-linha">
                    <span class="dados-label">Data de Lançamento:</span>
                    <span class="dados-valor">${dataFormatada}</span>
                </div>
                <div class="dados-linha">
                    <span class="dados-label">Colaborador:</span>
                    <span class="dados-valor">${colaboradorNome}</span>
                </div>
                <div class="dados-linha">
                    <span class="dados-label">Cargo:</span>
                    <span class="dados-valor">${cargo}</span>
                </div>
                <div class="dados-linha">
                    <span class="dados-label">RGM:</span>
                    <span class="dados-valor">${rgm}</span>
                </div>
                <div class="dados-linha">
                    <span class="dados-label">Unidade:</span>
                    <span class="dados-valor">${unidade}</span>
                </div>
                <div class="dados-linha">
                    <span class="dados-label">Apontamento Início:</span>
                    <span class="dados-valor">${apontamentoInicio}</span>
                </div>
                <div class="dados-linha">
                    <span class="dados-label">Apontamento Fim:</span>
                    <span class="dados-valor">${apontamentoFim}</span>
                </div>
                <div class="dados-linha">
                    <span class="dados-label">Motivo:</span>
                    <span class="dados-valor">${motivo}</span>
                </div>
                <div class="dados-linha">
                    <span class="dados-label">Observações:</span>
                    <span class="dados-valor">${observacoes}</span>
                </div>
                
                <div class="assinatura-area">
                    <div class="assinatura-item">
                        <div class="assinatura-linha"></div>
                        <div>Assinatura do Colaborador</div>
                    </div>
                    <div class="assinatura-item">
                        <div class="assinatura-linha"></div>
                        <div>Assinatura do Responsável</div>
                    </div>
                </div>
                
                <div class="rodape">
                    <div class="rodape-info">
                        <span>${unidadeInfo.nome}</span>
                        <span>${unidadeInfo.endereco}</span>
                    </div>
                    <div>📞 ${unidadeInfo.telefone}</div>
                </div>
                
                <div class="data-emissao">
                    Emitido em: ${dataEmissao}
                </div>
            `;

            document.getElementById('conteudoImpressao').innerHTML = html;
        }

        // Função para gerar e imprimir
        function gerarEImprimir(dados) {
            setDadosJustificativa(dados);
            setTimeout(() => {
                window.print();
            }, 100);
        }
    </script>
</body>
</html>
